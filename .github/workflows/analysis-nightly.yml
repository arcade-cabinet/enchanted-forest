name: Analysis Nightly

# Deterministic-grove regression: exercise the pure sim surface
# and assert that repeated calls with identical inputs produce
# byte-identical outputs, no NaN/Infinity leaks, fields stay in
# valid ranges, and the per-frame cost stays under the budget.
# Opens an issue labeled `sim-regression` on failure.
#
# Security: interpolated values are all repo-scoped (server_url,
# repository, run_id). No user-controllable input reaches run:.

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run determinism sweep
        env:
          TSX_TSCONFIG_PATH: ./tsconfig.app.json
        run: pnpm exec tsx scripts/determinism-sweep.ts

      - name: Open regression issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
          DATE_UTC="$(date -u +%Y-%m-%d)"
          gh issue create \
            --title "Nightly determinism sweep failed $DATE_UTC" \
            --label sim-regression \
            --body "The deterministic-grove sweep failed. Inspect the run: $RUN_URL"
