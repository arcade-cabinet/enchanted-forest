<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <title>Enchanted Forest — meditative rune-cadence survival in a living grove</title>

  <!-- Deep-forest backdrop -->
  <rect width="1200" height="630" fill="#0c1a10" />

  <!-- Distant moon glow, shifted to the right so the mark sits
       in left-half balance with the text. -->
  <circle cx="820" cy="200" r="180" fill="#f2c14e" opacity="0.05" />
  <circle cx="820" cy="200" r="110" fill="#f2c14e" opacity="0.07" />

  <!-- The mark: triskelion at 360×360 inside the left panel. -->
  <g transform="translate(180, 135)">
    <circle cx="180" cy="180" r="170" fill="#1a3a22" />
    <circle cx="180" cy="180" r="120" fill="#2e4a2f" opacity="0.6" />
    <circle cx="180" cy="180" r="78" fill="#f2c14e" opacity="0.08" />

    <!-- Shield (top, circle) -->
    <circle cx="180" cy="70" r="22" fill="none" stroke="#f2c14e" stroke-width="7" />
    <circle cx="180" cy="70" r="8" fill="#f2c14e" />

    <!-- Heal (lower-left, upward triangle) -->
    <path
      d="M 80 235 L 116 235 L 98 205 Z"
      fill="none"
      stroke="#f2c14e"
      stroke-width="7"
      stroke-linejoin="round"
    />
    <circle cx="98" cy="224" r="7" fill="#f2c14e" />

    <!-- Purify (lower-right, zigzag) -->
    <path
      d="M 244 205 L 256 235 L 268 205 L 280 235"
      fill="none"
      stroke="#f2c14e"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Triskelion arms -->
    <path
      d="M 180 180 Q 180 112, 180 84 M 180 180 Q 120 168, 98 220 M 180 180 Q 240 168, 262 220"
      fill="none"
      stroke="#f2c14e"
      stroke-width="6.5"
      stroke-linecap="round"
      opacity="0.55"
    />

    <!-- Central spirit-light -->
    <circle cx="180" cy="180" r="18" fill="#ecf1df" opacity="0.95" />
    <circle cx="172" cy="172" r="18" fill="#f2c14e" opacity="0.5" />
  </g>

  <!-- Wordmark + tagline -->
  <text
    x="620"
    y="310"
    font-family="Cormorant Garamond, Cinzel, serif"
    font-size="76"
    font-weight="600"
    fill="#ecf1df"
  >
    Enchanted Forest
  </text>
  <text
    x="620"
    y="360"
    font-family="Inter, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#8a9b82"
  >
    Learn a rune, chain its cadence, seal the grove.
  </text>
  <text
    x="620"
    y="395"
    font-family="Inter, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#8a9b82"
  >
    Finish not a conqueror — a wiser mage.
  </text>
</svg>
